<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人插畫作品集 | Portfolio</title>
    
    <!-- 引入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 Google Fonts: Inter 作為高級無襯線字體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind 自訂設定 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        'canvas': '#FCFCFC',
                        'ink': '#111111',
                    }
                }
            }
        }
    </script>

    <style>
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #FCFCFC;
        }
        ::-webkit-scrollbar-thumb {
            background: #E5E5E5;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #CCCCCC;
        }
        img {
            -webkit-user-drag: none;
        }
    </style>
</head>
<body class="bg-canvas text-ink font-sans antialiased selection:bg-gray-200 selection:text-ink">

    <!-- 導覽列 Navbar -->
    <header class="fixed top-0 w-full z-50 bg-canvas/80 backdrop-blur-md px-6 md:px-12 py-8 transition-all duration-300">
        <div class="max-w-screen-2xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4 sm:gap-0">
            <!-- Logo / Name -->
            <a href="#" id="logo-link" class="font-semibold text-lg tracking-[0.15em] uppercase hover:opacity-70 transition-opacity duration-300">
                Your Name
            </a>
            
            <!-- Links -->
            <nav class="flex gap-8 text-sm tracking-wide font-light items-center">
                <a href="#" data-target="page-work" class="nav-link relative after:content-[''] after:absolute after:bottom-0 after:left-0 after:w-full after:h-[1px] after:bg-ink after:scale-x-100 after:origin-bottom-right after:transition-transform after:duration-300">Work</a>
                <a href="#" data-target="page-about" class="nav-link relative hover:opacity-70 transition-opacity duration-300">About</a>
                <a href="https://www.instagram.com/你的IG帳號" target="_blank" rel="noopener noreferrer" class="relative hover:opacity-70 transition-opacity duration-300" aria-label="Instagram">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                    </svg>
                </a>
            </nav>
        </div>
    </header>

    <!-- 頁面容器 1：Work (主視覺網格) -->
    <main id="page-work" class="pt-36 pb-24 px-6 md:px-12 max-w-screen-2xl mx-auto transition-opacity duration-500 ease-in-out">
        <!-- 畫廊容器 (由 JS 動態填入內容) -->
        <div id="gallery-container" class="columns-1 sm:columns-2 lg:columns-3 xl:columns-4 gap-6 md:gap-8 space-y-6 md:space-y-8">
        </div>
    </main>

    <!-- 頁面容器 2：關於我 About (預設隱藏) -->
    <main id="page-about" class="hidden opacity-0 pt-36 pb-24 px-6 md:px-12 max-w-screen-md mx-auto text-center transition-opacity duration-500 ease-in-out flex flex-col justify-center min-h-[80vh]">
        <h2 class="text-2xl font-medium tracking-widest mb-8">ABOUT</h2>
        <div class="w-12 h-[1px] bg-ink/20 mx-auto mb-8"></div>
        <p class="text-ink/70 leading-relaxed font-light mb-6">
            你好，我是一名熱愛描繪生活與夢境的插畫家。<br>
            作品多以純粹的幾何、光影與自然元素交織而成，致力於在極簡的畫面中捕捉細膩的情感。
        </p>
        <p class="text-ink/70 leading-relaxed font-light">
            目前接受各類插畫委託與合作，歡迎透過上方 Instagram 與我聯繫。
        </p>
    </main>

    <!-- 頁尾 Footer -->
    <footer class="py-12 px-6 md:px-12 text-center text-sm text-gray-400 font-light tracking-wide">
        <p>&copy; 2024 Your Name. All Rights Reserved.</p>
    </footer>

    <!-- Lightbox 燈箱元件 -->
    <div id="lightbox-modal" class="fixed inset-0 z-[100] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center bg-canvas/95 backdrop-blur-md p-6 sm:p-12">
        <div class="modal-backdrop absolute inset-0 cursor-zoom-out"></div>
        <button id="lightbox-close" class="absolute top-6 right-6 md:top-10 md:right-10 z-10 p-2 text-ink/40 hover:text-ink transition-colors cursor-pointer" aria-label="Close">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <div class="relative z-10 w-full max-w-5xl max-h-full flex flex-col items-center pointer-events-none">
            <img id="lightbox-img" src="" alt="Artwork" class="max-h-[70vh] w-auto object-contain shadow-2xl pointer-events-auto">
            <div class="mt-8 text-center max-w-2xl pointer-events-auto">
                <h2 id="lightbox-title" class="text-2xl font-medium tracking-widest text-ink"></h2>
                <p id="lightbox-desc" class="mt-4 text-sm font-light leading-relaxed text-ink/70"></p>
            </div>
        </div>
    </div>

    <!-- 互動腳本 (純 JavaScript) -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
    const galleryContainer = document.getElementById('gallery-container');

    // --- 1. 從資料庫讀取資料並渲染 ---
    async function loadGallery() {
        try {
            const response = await fetch('data.json');
            if (!response.ok) throw new Error('尚未建立作品資料');
            
            const data = await response.json();
            const works = data.items || [];

            if (works.length === 0) {
                galleryContainer.innerHTML = '<p class="col-span-full text-center text-gray-400 py-20">目前尚無作品，請進入後台新增。</p>';
                return;
            }

            // 清空容器並塞入真實作品
            galleryContainer.innerHTML = '';
            works.forEach(work => {
                const itemHTML = `
                    <div class="break-inside-avoid relative group overflow-hidden bg-gray-100 cursor-pointer gallery-item"
                         data-src="${work.src}" data-title="${work.title}" data-desc="${work.desc}">
                        <img src="${work.src}" alt="${work.title}" loading="lazy" 
                             class="w-full h-auto object-cover transform transition-transform duration-700 ease-out group-hover:scale-[1.03]">
                        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/40 transition-colors duration-500 ease-out flex items-center justify-center p-6 pointer-events-none">
                            <h3 class="text-white text-lg font-medium tracking-widest opacity-0 translate-y-4 group-hover:opacity-100 group-hover:translate-y-0 transition-all duration-500 ease-out text-center">${work.title}</h3>
                        </div>
                    </div>
                `;
                galleryContainer.insertAdjacentHTML('beforeend', itemHTML);
            });

            // 渲染完成後，重新綁定燈箱事件
            bindLightboxEvents();

        } catch (error) {
            console.log(error.message);
            galleryContainer.innerHTML = '<p class="col-span-full text-center text-gray-400 py-20">作品集準備中...</p>';
        }
    }

    // --- 2. 燈箱事件綁定函數 ---
    function bindLightboxEvents() {
        const items = document.querySelectorAll('.gallery-item');
        items.forEach(item => {
            item.addEventListener('click', () => {
                const src = item.getAttribute('data-src');
                const title = item.getAttribute('data-title');
                const desc = item.getAttribute('data-desc');
                openModal(src, title, desc); // 這邊會對接到你原本的 Lightbox 邏輯
            });
        });
    }

    // 啟動載入
    loadGallery();
    
    // ... (保留你原本的頁面切換、Lightbox 打開/關閉等其餘邏輯)
});
    </script>
</body>
</html>
