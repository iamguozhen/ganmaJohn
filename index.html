<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ganmaJohn | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], }, colors: { 'canvas': '#FCFCFC', 'ink': '#111111', } } } }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #FCFCFC; }
        ::-webkit-scrollbar-thumb { background: #E5E5E5; }
        ::-webkit-scrollbar-thumb:hover { background: #CCCCCC; }
        img { -webkit-user-drag: none; }
    </style>
</head>
<body class="bg-canvas text-ink font-sans antialiased selection:bg-gray-200 selection:text-ink">

    <header class="fixed top-0 w-full z-50 bg-canvas/80 backdrop-blur-md px-6 md:px-12 py-8 transition-all duration-300">
        <div class="max-w-screen-2xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4 sm:gap-0">
            <a href="#" id="logo-link" class="font-semibold text-lg tracking-[0.15em] hover:opacity-70 transition-opacity duration-300">ganmaJohn</a>
            <nav class="flex gap-8 text-sm tracking-wide font-light items-center">
                <a href="#" data-target="page-work" class="nav-link relative after:content-[''] after:absolute after:bottom-0 after:left-0 after:w-full after:h-[1px] after:bg-ink after:scale-x-100 after:origin-bottom-right after:transition-transform after:duration-300">Work</a>
                <a href="#" data-target="page-about" class="nav-link relative hover:opacity-70 transition-opacity duration-300">About</a>
                <a href="#" id="ig-link" target="_blank" rel="noopener noreferrer" class="relative hover:opacity-70 transition-opacity duration-300" aria-label="Instagram">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                </a>
            </nav>
        </div>
    </header>

    <main id="page-work" class="pt-36 pb-24 px-6 md:px-12 max-w-screen-2xl mx-auto transition-opacity duration-500 ease-in-out">
        <div id="gallery-container" class="columns-1 sm:columns-2 lg:columns-3 xl:columns-4 gap-6 md:gap-8 space-y-6 md:space-y-8"></div>
    </main>

    <main id="page-about" class="hidden opacity-0 pt-36 pb-24 px-6 md:px-12 max-w-screen-md mx-auto text-center transition-opacity duration-500 ease-in-out flex flex-col justify-center min-h-[80vh]">
        <div id="about-img-container" class="hidden mb-12">
            <img id="about-avatar" src="" alt="Avatar" class="w-40 h-40 md:w-56 md:h-56 mx-auto object-cover rounded-full">
        </div>

        <h2 class="text-2xl font-medium tracking-widest mb-8">ABOUT</h2>
        <div class="w-12 h-[1px] bg-ink/20 mx-auto mb-8"></div>
        <p id="about-p1" class="text-ink/70 leading-relaxed font-light mb-6"></p>
        <p id="about-p2" class="text-ink/70 leading-relaxed font-light"></p>
    </main>

    <footer class="py-12 px-6 md:px-12 text-center text-sm text-gray-400 font-light tracking-wide">
        <p>&copy; 2026 ganmaJohn. All Rights Reserved.</p>
    </footer>

    <div id="lightbox-modal" class="fixed inset-0 z-[100] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center bg-canvas/95 backdrop-blur-md p-6 sm:p-12">
        <div class="modal-backdrop absolute inset-0 cursor-zoom-out"></div>
        <button id="lightbox-close" class="absolute top-6 right-6 md:top-10 md:right-10 z-20 p-2 text-ink/40 hover:text-ink transition-colors cursor-pointer"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
        <button id="prev-btn" class="absolute left-4 z-20 p-4 text-ink/20 hover:text-ink transition-colors cursor-pointer hidden md:block"><svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
        <button id="next-btn" class="absolute right-4 z-20 p-4 text-ink/20 hover:text-ink transition-colors cursor-pointer hidden md:block"><svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
        <div class="relative z-10 w-full max-w-5xl max-h-full flex flex-col items-center pointer-events-none">
            <img id="lightbox-img" src="" alt="Artwork" class="max-h-[70vh] w-auto object-contain shadow-2xl pointer-events-auto transition-all duration-300">
            <div id="image-counter" class="mt-4 text-[10px] tracking-widest text-ink/30 uppercase font-medium"></div>
            <div class="mt-6 text-center max-w-2xl pointer-events-auto">
                <h2 id="lightbox-title" class="text-xl font-medium tracking-widest text-ink"></h2>
                <p id="lightbox-desc" class="mt-3 text-sm font-light leading-relaxed text-ink/70"></p>
            </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const galleryContainer = document.getElementById('gallery-container');
        const navLinks = document.querySelectorAll('.nav-link');
        const pages = { 'page-work': document.getElementById('page-work'), 'page-about': document.getElementById('page-about') };
        const modal = document.getElementById('lightbox-modal');
        const modalImg = document.getElementById('lightbox-img');
        const modalTitle = document.getElementById('lightbox-title');
        const modalDesc = document.getElementById('lightbox-desc');
        const closeBtn = document.getElementById('lightbox-close');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const counter = document.getElementById('image-counter');

        let currentGallery = [];
        let currentIndex = 0;

        function switchPage(targetId) {
            navLinks.forEach(nav => { nav.className = (nav.getAttribute('data-target') === targetId) ? "nav-link relative after:content-[''] after:absolute after:bottom-0 after:left-0 after:w-full after:h-[1px] after:bg-ink after:scale-x-100 after:origin-bottom-right after:transition-transform after:duration-300" : "nav-link relative hover:opacity-70 transition-opacity duration-300"; });
            Object.keys(pages).forEach(id => { const page = pages[id]; if (id === targetId) { page.classList.remove('hidden'); setTimeout(() => page.classList.remove('opacity-0'), 50); } else { page.classList.add('hidden', 'opacity-0'); } });
            window.scrollTo(0, 0);
        }
        navLinks.forEach(link => { link.addEventListener('click', (e) => { e.preventDefault(); switchPage(link.getAttribute('data-target')); }); });
        document.getElementById('logo-link').addEventListener('click', (e) => { e.preventDefault(); switchPage('page-work'); });

        function updateLightboxImage() {
            if (!currentGallery[currentIndex]) return;
            let src = currentGallery[currentIndex];
            if (src.startsWith('/')) src = src.substring(1);
            modalImg.style.opacity = '0';
            setTimeout(() => { modalImg.src = src; modalImg.style.opacity = '1'; counter.textContent = currentGallery.length > 1 ? `${currentIndex + 1} / ${currentGallery.length}` : ''; }, 150);
            prevBtn.style.display = currentGallery.length > 1 ? 'block' : 'none';
            nextBtn.style.display = currentGallery.length > 1 ? 'block' : 'none';
        }

        function openModal(images, title, desc) {
            currentGallery = images; currentIndex = 0;
            modalTitle.textContent = title || ''; modalDesc.textContent = desc || '';
            updateLightboxImage(); modal.classList.remove('hidden'); document.body.style.overflow = 'hidden';
            requestAnimationFrame(() => modal.classList.remove('opacity-0'));
        }
        function closeModal() { modal.classList.add('opacity-0'); document.body.style.overflow = ''; setTimeout(() => { modal.classList.add('hidden'); }, 300); }
        prevBtn.onclick = (e) => { e.stopPropagation(); currentIndex = (currentIndex - 1 + currentGallery.length) % currentGallery.length; updateLightboxImage(); };
        nextBtn.onclick = (e) => { e.stopPropagation(); currentIndex = (currentIndex + 1) % currentGallery.length; updateLightboxImage(); };
        closeBtn.onclick = closeModal;
        modal.onclick = (e) => { if (e.target.classList.contains('modal-backdrop')) closeModal(); };

        document.addEventListener('keydown', (e) => {
            if (modal.classList.contains('hidden')) return;
            if (e.key === 'Escape') closeModal();
            if (e.key === 'ArrowLeft') prevBtn.onclick(e);
            if (e.key === 'ArrowRight') nextBtn.onclick(e);
        });

        async function loadGallery() {
            try {
                const response = await fetch('data.json?t=' + new Date().getTime());
                const data = await response.json();
                const works = data.items || [];
                galleryContainer.innerHTML = works.length ? '' : '<p class="col-span-full text-center text-gray-400 py-20">目前尚無作品</p>';
                works.forEach(work => {
                    let images = (work.image_list && work.image_list.length > 0) ? work.image_list.map(img => img.url) : (work.src ? [work.src] : []);
                    if (images.length === 0 || !images[0]) return;
                    let coverSrc = images[0].startsWith('/') ? images[0].substring(1) : images[0];
                    const item = document.createElement('div');
                    item.className = "break-inside-avoid relative group overflow-hidden bg-gray-100 cursor-pointer gallery-item";
                    item.innerHTML = `
                        <img src="${coverSrc}" alt="${work.title}" loading="lazy" class="w-full h-auto object-cover transform transition-transform duration-700 ease-out group-hover:scale-[1.03]">
                        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/40 transition-colors duration-500 ease-out flex items-center justify-center p-6 pointer-events-none">
                            <div class="text-center">
                                <h3 class="text-white text-lg font-medium tracking-widest opacity-0 translate-y-4 group-hover:opacity-100 group-hover:translate-y-0 transition-all duration-500 ease-out">${work.title || ''}</h3>
                                ${images.length > 1 ? `<p class="text-white/50 text-[10px] mt-2 opacity-0 group-hover:opacity-100 transition-opacity duration-700 uppercase tracking-widest">+ ${images.length} images</p>` : ''}
                            </div>
                        </div>`;
                    item.onclick = () => openModal(images, work.title, work.desc);
                    galleryContainer.appendChild(item);
                });
            } catch (e) { galleryContainer.innerHTML = '<p class="col-span-full text-center text-gray-400 py-20">作品集讀取中...</p>'; }
        }

        async function loadSettings() {
            try {
                const response = await fetch('settings.json?t=' + new Date().getTime());
                const s = await response.json();
                if (s.ig_url) document.getElementById('ig-link').href = s.ig_url;
                if (s.about_image) {
                    let imgPath = s.about_image.startsWith('/') ? s.about_image.substring(1) : s.about_image;
                    document.getElementById('about-avatar').src = imgPath;
                    document.getElementById('about-img-container').classList.remove('hidden');
                }
                document.getElementById('about-p1').innerHTML = s.about_p1 ? s.about_p1.replace(/\n/g, '<br>') : '';
                document.getElementById('about-p2').innerHTML = s.about_p2 ? s.about_p2.replace(/\n/g, '<br>') : '';
            } catch (e) {}
        }

        loadGallery(); loadSettings();
    });
    </script>
</body>
</html>
